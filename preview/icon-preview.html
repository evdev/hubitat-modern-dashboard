<!doctype html>
<html><head><meta charset="utf-8"/>
<style>
  body { background:#0b0d12; margin:0; padding:24px; }
  .row { display:flex; align-items:center; gap:24px; margin-bottom:24px; }
  .lbl { color:#9aa4b8; font:13px system-ui; }
  .tile {
    width:44px; height:44px; border-radius:12px; background:#15171d;
    display:grid; place-items:center; border:1px solid #23262e;
  }
  .tile svg { width:21px; height:21px; overflow:visible; fill:none; stroke:currentColor; stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25)); }
  .big .tile svg { width:96px; height:96px; }
  .big .tile { width:120px; height:120px; }
</style>
</head>
<body>
<div class="row big">
  <div class="lbl">96px</div>
  <div class="tile"><svg viewBox="0 0 24 24"><defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5fd3b0"/><stop offset="1" stop-color="#2b6bff"/></linearGradient></defs><circle cx="12" cy="12" r="10.5" fill="url(#g1)" stroke="#2b54e6" stroke-width="0.7"/><circle cx="12" cy="12" r="8.8" fill="none" stroke="#ffffff" stroke-width="0.9" opacity="0.7"/><text x="12" y="12.2" font-size="8.4" font-weight="800" fill="#ffffff" stroke="none" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif">72°</text></svg></div>
</div>
<div class="row">
  <div class="lbl">21px (actual nav size)</div>
  <div class="tile"><svg viewBox="0 0 24 24"><defs><linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5fd3b0"/><stop offset="1" stop-color="#2b6bff"/></linearGradient></defs><circle cx="12" cy="12" r="10.5" fill="url(#g2)" stroke="#2b54e6" stroke-width="0.7"/><circle cx="12" cy="12" r="8.8" fill="none" stroke="#ffffff" stroke-width="0.9" opacity="0.7"/><text x="12" y="12.2" font-size="8.4" font-weight="800" fill="#ffffff" stroke="none" text-anchor="middle" dominant-baseline="central" font-family="system-ui, sans-serif">72°</text></svg></div>
</div>
</body></html>
